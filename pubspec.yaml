name: dulth_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.10.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Các thư viện hỗ trợ giao diện và tính năng
  cupertino_icons: ^1.0.6
  intl: ^0.18.1
  fl_chart: ^0.66.0
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Khai báo thư mục chứa hình ảnh
  assets:
    - assets/images/
    - assets/placeholders/

  # Khai báo font chữ local (nếu dùng kèm Google Fonts)
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-VariableFont_opsz,wght.ttf
        - asset: assets/fonts/Inter-Italic-VariableFont_opsz,wght.ttf
          weight: 700